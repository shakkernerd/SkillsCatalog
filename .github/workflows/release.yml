name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.2
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve release tag
        id: release-tag
        shell: bash
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          WORKFLOW_DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$WORKFLOW_DISPATCH_TAG"
          else
            tag="$RELEASE_EVENT_TAG"
          fi

          if [ -z "$tag" ]; then
            echo "release tag is required" >&2
            exit 1
          fi

          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*|0|[1-9][0-9]*)(\.([0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*|0|[1-9][0-9]*))*)?$ ]]; then
            echo "release tag must look like v1.2.3 or v1.2.3-beta.1, got: $tag" >&2
            exit 1
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ steps.release-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "v$version" ]; then
            echo "release tag $RELEASE_TAG does not match package.json version $version" >&2
            exit 1
          fi

      - name: Resolve npm dist tag
        id: npm-dist-tag
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "$version" == *-* ]]; then
            dist_tag="next"
          else
            dist_tag="latest"
          fi
          printf 'tag=%s\n' "$dist_tag" >> "$GITHUB_OUTPUT"

      - name: Build, test, pack, and smoke
        run: pnpm run package:check

      - name: Pack release tarball
        run: |
          mkdir -p release-dist
          npm pack --pack-destination release-dist

      - name: Publish to npm
        run: npm publish ./release-dist/*.tgz --provenance --access public --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ steps.npm-dist-tag.outputs.tag }}

      - name: Upload release tarball
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          files: release-dist/*.tgz

      - name: Update release notes with publish proof
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          version="$(node -p "require('./package.json').version")"
          gh release view "$RELEASE_TAG" --json body --jq .body > release-body.md
          node scripts/release-notes.mjs append-publish-proof \
            --version "$version" \
            --body-file release-body.md \
            --output release-notes.md
          gh release edit "$RELEASE_TAG" --notes-file release-notes.md
